  <path d="M6 24 Q0 32 6 40" fill="none" stroke="url(#g)" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <path d="M54 28 Q58 32 54 36" fill="none" stroke="url(#g)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M58 24 Q64 32 58 40" fill="none" stroke="url(#g)" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
