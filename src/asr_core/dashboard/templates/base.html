<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ASRCore 中控台{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-row">
                <div>
                    <h1>ASRCore 中控台</h1>
                    <p class="subtitle">模型管理 &middot; 推理监控 &middot; GPU 状态</p>
                </div>
                <button class="refresh-btn"
                        onclick="htmx.trigger('#status-panel','refresh');htmx.trigger('#logs-content','refresh')">刷新</button>
            </div>
        </header>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
